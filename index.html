<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Escape Room</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .door-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5); }
        .door-card { transition: all 0.3s ease; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const API_URL = "http://localhost:8000/api";

        function App() {
            const [currentRoomId, setCurrentRoomId] = useState(1);
            const [roomData, setRoomData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [guess, setGuess] = useState("");
            const [error, setError] = useState("");
            const [playerName, setPlayerName] = useState("Anonymous");
            
            // New Door State
            const [newQuestion, setNewQuestion] = useState("");
            const [newAnswer, setNewAnswer] = useState("");
            
            // Hint State
            const [newHint, setNewHint] = useState("");

            useEffect(() => {
                fetchRoomData(currentRoomId);
            }, [currentRoomId]);

            const fetchRoomData = async (id) => {
                setLoading(true);
                try {
                    const response = await fetch(`${API_URL}/rooms/${id}`);
                    if (!response.ok) {
                        if (response.status === 404 && id === 1) {
                            // Lobby doesn't exist, create it
                            await fetch(`${API_URL}/rooms`, {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({
                                    parent_room_id: null,
                                    question: "Welcome to the Infinite Escape Room. To enter the maze, answer this: I speak without a mouth and hear without ears. I have no body, but I come alive with wind. What am I?",
                                    answer: "echo",
                                    creator: "The Architect"
                                })
                            });
                            fetchRoomData(1);
                            return;
                        }
                        throw new Error("Room not found");
                    }
                    const data = await response.json();
                    setRoomData(data);
                    setGuess("");
                    setError("");
                } catch (err) {
                    setError("Failed to load room.");
                }
                setLoading(false);
            };

            const handleSolve = async (doorId) => {
                try {
                    const response = await fetch(`${API_URL}/rooms/${doorId}/solve`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ guess: guess })
                    });
                    const data = await response.json();
                    if (data.success) {
                        setCurrentRoomId(data.new_room_id);
                    } else {
                        setError("Incorrect answer. Try again or try another door.");
                    }
                } catch (err) {
                    setError("Error connecting to server.");
                }
            };

            const handleCreateDoor = async (e) => {
                e.preventDefault();
                try {
                    await fetch(`${API_URL}/rooms`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            parent_room_id: currentRoomId,
                            question: newQuestion,
                            answer: newAnswer,
                            creator: playerName
                        })
                    });
                    setNewQuestion("");
                    setNewAnswer("");
                    fetchRoomData(currentRoomId); // Reload to show the new door
                } catch (err) {
                    setError("Failed to create door.");
                }
            };

            const handleAddHint = async (e) => {
                e.preventDefault();
                try {
                    await fetch(`${API_URL}/rooms/${currentRoomId}/hints`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            creator: playerName,
                            message: newHint
                        })
                    });
                    setNewHint("");
                    fetchRoomData(currentRoomId); // Reload to show new hint
                } catch (err) {
                    setError("Failed to post hint.");
                }
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center text-2xl font-bold animate-pulse text-blue-400">Traversing the maze...</div>;
            if (!roomData) return <div className="text-red-500 p-10">Error loading maze.</div>;

            const isDeadEnd = roomData.doors.length === 0;

            return (
                <div className="min-h-screen p-8 max-w-6xl mx-auto flex flex-col md:flex-row gap-8">
                    
                    {/* Left Column: The Room and Doors */}
                    <div className="flex-grow space-y-8">
                        <div className="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
                            <div className="flex justify-between items-center mb-4">
                                <h1 className="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                                    Room #{roomData.id}
                                </h1>
                                <div className="text-sm bg-slate-700 px-3 py-1 rounded-full text-slate-300">
                                    Created by: <span className="font-bold text-white">{roomData.creator}</span>
                                </div>
                            </div>
                            
                            <div className="mb-6 bg-slate-900 p-6 rounded-xl border-l-4 border-blue-500">
                                <p className="text-xl text-slate-300 italic">" {roomData.question} "</p>
                            </div>

                            <div className="flex items-center gap-2 text-emerald-400 font-semibold mb-6">
                                <i className="fa-solid fa-compass"></i>
                                <span>Shortest path to the edge: {roomData.distance_to_edge} doors</span>
                            </div>
                        </div>

                        {error && (
                            <div className="bg-red-900/50 border border-red-500 text-red-200 p-4 rounded-xl animate-bounce">
                                <i className="fa-solid fa-triangle-exclamation mr-2"></i>{error}
                            </div>
                        )}

                        {!isDeadEnd ? (
                            <div>
                                <h2 className="text-2xl font-bold mb-4 flex items-center gap-2"><i className="fa-solid fa-dungeon"></i> Choose a Door</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {roomData.doors.map(door => (
                                        <div key={door.id} className="door-card bg-slate-800 p-6 rounded-xl border border-slate-600 flex flex-col justify-between">
                                            <div>
                                                <div className="text-xs text-slate-400 uppercase tracking-widest mb-2 border-b border-slate-700 pb-2">Door to Room #{door.id}</div>
                                                <p className="text-lg mb-4 text-slate-200">" {door.question} "</p>
                                            </div>
                                            <div className="flex gap-2 mt-4">
                                                <input 
                                                    type="text" 
                                                    placeholder="Your answer..." 
                                                    className="flex-grow bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500"
                                                    onChange={(e) => setGuess(e.target.value)}
                                                />
                                                <button 
                                                    onClick={() => handleSolve(door.id)}
                                                    className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg font-bold transition-colors"
                                                >
                                                    Open
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="bg-gradient-to-br from-emerald-900 to-slate-900 p-8 rounded-2xl border border-emerald-500 shadow-[0_0_30px_rgba(16,185,129,0.2)]">
                                <h2 className="text-3xl font-bold mb-2 text-emerald-400"><i className="fa-solid fa-leaf"></i> You reached the edge!</h2>
                                <p className="text-slate-300 mb-6">Congratulations! You are the first person to make it this deep into this branch of the maze. To leave your legacy, you must build a new door for others to solve.</p>
                                
                                <form onSubmit={handleCreateDoor} className="space-y-4">
                                    <div>
                                        <label className="block text-sm text-slate-400 mb-1">Your Riddle / Question</label>
                                        <textarea required value={newQuestion} onChange={e=>setNewQuestion(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-500" rows="3"></textarea>
                                    </div>
                                    <div>
                                        <label className="block text-sm text-slate-400 mb-1">The Answer</label>
                                        <input required type="text" value={newAnswer} onChange={e=>setNewAnswer(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-500" />
                                    </div>
                                    <div>
                                        <label className="block text-sm text-slate-400 mb-1">Your Display Name</label>
                                        <input required type="text" value={playerName} onChange={e=>setPlayerName(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-500" />
                                    </div>
                                    <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-lg transition-colors">
                                        Build New Door
                                    </button>
                                </form>
                            </div>
                        )}
                    </div>

                    {/* Right Column: Chat/Hints */}
                    <div className="w-full md:w-80 flex flex-col">
                        <div className="bg-slate-800 rounded-2xl border border-slate-700 flex flex-col h-[600px] overflow-hidden sticky top-8 shadow-xl">
                            <div className="bg-slate-900 p-4 border-b border-slate-700 font-bold flex items-center gap-2">
                                <i className="fa-regular fa-comments text-blue-400"></i> Hints & Messages
                            </div>
                            
                            <div className="flex-grow overflow-y-auto p-4 space-y-4">
                                {roomData.hints.length === 0 ? (
                                    <div className="text-slate-500 text-center italic mt-10">No hints for this room yet. Be the first to leave a message!</div>
                                ) : (
                                    roomData.hints.map(hint => (
                                        <div key={hint.id} className="bg-slate-700/50 p-3 rounded-lg text-sm border border-slate-600/50">
                                            <div className="font-bold text-blue-300 mb-1">{hint.creator}</div>
                                            <div className="text-slate-200">{hint.message}</div>
                                            <div className="text-xs text-slate-500 mt-2 text-right">{new Date(hint.created_at).toLocaleTimeString()}</div>
                                        </div>
                                    ))
                                )}
                            </div>

                            <form onSubmit={handleAddHint} className="p-4 bg-slate-900 border-t border-slate-700">
                                <input 
                                    type="text" 
                                    required
                                    value={newHint}
                                    onChange={e=>setNewHint(e.target.value)}
                                    placeholder="Leave a hint..." 
                                    className="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500 mb-2"
                                />
                                <button type="submit" className="w-full bg-blue-600/20 hover:bg-blue-600/40 text-blue-400 text-sm font-bold py-2 rounded-lg transition-colors border border-blue-500/30">
                                    Send Message
                                </button>
                            </form>
                        </div>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
